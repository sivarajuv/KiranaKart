server.port=8080
spring.application.name=kiranakart

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:kiranakartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Claude API - Replace with your actual API key
claude.api.key=YOUR_CLAUDE_API_KEY_HERE
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514

# JWT Security
jwt.secret=KiranaKart2024SuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS
spring.web.cors.allowed-origins=http://localhost:3000
